<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benjamin Idea Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes text-gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animate-text-gradient {
        background: linear-gradient(90deg, #EE1D52, #00F2EA, #EE1D52);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: text-gradient-animation 4s ease infinite;
      }
      @keyframes sparkle-animation {
        0%, 100% { transform: scale(0.5); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; }
      }
      .sparkle {
        animation: sparkle-animation 1.5s ease-in-out infinite;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }
      @keyframes slide-in-left {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slide-in-left 0.3s ease-out forwards;
      }
       @keyframes fade-in-backdrop {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in-backdrop {
        animation: fade-in-backdrop 0.3s ease-out forwards;
      }
      
      /* Tech Stream Effect */
      @keyframes tech-scan {
        0% { background-position: 0% -100%; }
        100% { background-position: 0% 200%; }
      }
      .animate-tech-scan {
        background: linear-gradient(to bottom, 
            transparent 0%, 
            rgba(0, 242, 234, 0.1) 25%, 
            rgba(238, 29, 82, 0.1) 50%, 
            rgba(0, 242, 234, 0.1) 75%, 
            transparent 100%);
        background-size: 100% 200%;
        animation: tech-scan 2.5s linear infinite;
      }
      @keyframes stream-drop {
        0% { transform: translateY(-100%); opacity: 0; }
        20% { opacity: 0.7; }
        80% { opacity: 0.7; }
        100% { transform: translateY(100%); opacity: 0; }
      }
      .stream-line {
        position: absolute;
        width: 1px;
        height: 100%;
        top: 0;
        background: linear-gradient(to bottom, transparent, #00F2EA, transparent);
        opacity: 0;
        animation: stream-drop 3s linear infinite;
      }
      .stream-line.red {
        background: linear-gradient(to bottom, transparent, #EE1D52, transparent);
      }

      /* Footer Scan Animation */
      @keyframes scan-horizontal {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .footer-scan-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, #00F2EA, #EE1D52, transparent);
        animation: scan-horizontal 2.5s ease-in-out infinite;
        opacity: 0.9;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'tiktok-red': '#EE1D52',
              'tiktok-cyan': '#00F2EA',
              'tiktok-bg': '#010101',
              'tiktok-card': '#121212',
              'tiktok-input': '#262626',
              'tiktok-border': '#2f2f2f'
            },
            fontFamily: {
              sans: ['"Proxima Nova"', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.12.0",
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

  </body>
</html>
